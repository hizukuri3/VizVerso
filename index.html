  <!-- 構造化データ: SoftwareApplication -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "VizVerso",
    "description": "Tableauワークブック（.twbx / .twb）の内部構造を解析し、計算フィールドの依存関係や未使用フィールドを可視化するブラウザ完結型ツール",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Web",
    "url": "https://viz-verso.pages.dev/",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "JPY"
    }
  }
  </script>

  <!-- 構造化データ: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "アップロードしたワークブックのデータは安全ですか？",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "すべての解析はブラウザ内で完結し、ワークブックの内容がサーバーに送信されることはありません。"
        }
      },
      {
        "@type": "Question",
        "name": "どのファイル形式に対応していますか？",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": ".twbx（パッケージドワークブック）と .twb（XML）に対応しています。ファイルサイズは100MBまでです。"
        }
      },
      {
        "@type": "Question",
        "name": "利用は無料ですか？",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "無料でご利用いただけます。"
        }
      },
      {
        "@type": "Question",
        "name": "Tableau のライセンスやインストールは必要ですか？",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "不要です。ブラウザだけで動作します。"
        }
      }
    ]
  }
  </script>

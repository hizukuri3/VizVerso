name = "viz-verso"
# Cloudflare Pages の wrangler 設定（direct upload 用の現行スキーマ）。
# デプロイは .github/workflows/deploy.yml の wrangler-action (wrangler 4) が行う。
pages_build_output_dir = "dist"

# 匿名の機能利用イベント計測用 Analytics Engine データセット。
# functions/api/event.ts が env.VIZVERSO_ANALYTICS 経由で writeDataPoint する
# （バインディング不在時は 204 を返す無害な no-op）。
#
# 注意: このバインディングは CF アカウントで Analytics Engine が有効になっていないと
# デプロイ自体が失敗する。有効化（https://dash.cloudflare.com → Workers → Analytics Engine）
# した後で、下記のコメントを外すと計測が有効になる。
# [[analytics_engine_datasets]]
# binding = "VIZVERSO_ANALYTICS"
# dataset = "vizverso_events"
